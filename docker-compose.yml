services:

  # ── Internal databases — NO host port exposure ──────────────────────────────
  # Only reachable by other containers on the `internal` network.
  shard_0:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       playto_shard_0
    volumes:
      - shard_0_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d playto_shard_0"]
      interval: 5s
      timeout: 5s
      retries: 10

  shard_1:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       playto_shard_1
    volumes:
      - shard_1_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d playto_shard_1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Dedicated idempotency key database ──────────────────────────────
  # Isolated PostgreSQL for idempotency keys only.
  # Can be cleared, audited, or scaled independently of business shards.
  idempotency_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       playto_idempotency
    volumes:
      - idempotency_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d playto_idempotency"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis — internal only, password-protected ────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --bind 0.0.0.0 --protected-mode no
    networks:
      - internal
    restart: unless-stopped

  # ── Django API — only :8000 exposed to host ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
    # WARNING: Node.js 20 actions are deprecated. Actions like checkout@v4 and setup-python@v5 will be forced to run on Node.js 24 starting June 2nd, 2026.
    # test-backend: Ensure CI workflows are updated to use Node.js 24 or set FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true.

      - ./backend:/app
    ports:
      - "8000:8000"            # Only public-facing service on the backend side
    environment:
      SECRET_KEY:             ${SECRET_KEY}
      DEBUG:                  "False"
      ALLOWED_HOSTS:          ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS:   ${CORS_ALLOWED_ORIGINS}
      DATABASE_URL:           ${DATABASE_URL}
      SHARD_0_URL:            ${SHARD_0_URL}
      SHARD_1_URL:            ${SHARD_1_URL}
      IDEMPOTENCY_DB_URL:     ${IDEMPOTENCY_DB_URL}
      REDIS_URL:              ${REDIS_URL}
      IDEMPOTENCY_REDIS_URL:  ${IDEMPOTENCY_REDIS_URL}
    depends_on:
      shard_0:
        condition: service_healthy
      shard_1:
        condition: service_healthy
      idempotency_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
      - public
    restart: unless-stopped

  # ── Celery Worker — internal only, no exposed ports ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
    environment:
      SECRET_KEY:             ${SECRET_KEY}
      DEBUG:                  "False"
      DATABASE_URL:           ${DATABASE_URL}
      SHARD_0_URL:            ${SHARD_0_URL}
      SHARD_1_URL:            ${SHARD_1_URL}
      IDEMPOTENCY_DB_URL:     ${IDEMPOTENCY_DB_URL}
      REDIS_URL:              ${REDIS_URL}
      IDEMPOTENCY_REDIS_URL:  ${IDEMPOTENCY_REDIS_URL}
    depends_on:
      shard_0:
        condition: service_healthy
      shard_1:
        condition: service_healthy
      idempotency_db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
      - public           # REQUIRED to reach Neon Cloud DBs
    restart: unless-stopped

  # ── Celery Beat — scheduler, internal only ───────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: celery -A worker.worker_app beat -l info
    volumes:
      - ./backend:/app/backend
      - ./worker:/app/worker
    environment:
      SECRET_KEY:             ${SECRET_KEY}
      DEBUG:                  "False"
      DATABASE_URL:           ${DATABASE_URL}
      SHARD_0_URL:            ${SHARD_0_URL}
      SHARD_1_URL:            ${SHARD_1_URL}
      IDEMPOTENCY_DB_URL:     ${IDEMPOTENCY_DB_URL}
      REDIS_URL:              ${REDIS_URL}
      IDEMPOTENCY_REDIS_URL:  ${IDEMPOTENCY_REDIS_URL}
    depends_on:
      - redis
      - backend
    networks:
      - internal
      - public
    restart: unless-stopped

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
  public:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  shard_0_data:
  shard_1_data:
  idempotency_data:
